<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admi HTML - Go Beats</title>
  <link rel="icon" href="/Fontend/img/logo de pestana .png">
  <style>
    :root {
      --bg: #06111f;
      --panel: rgba(10, 24, 48, 0.85);
      --line: rgba(124, 184, 255, 0.2);
      --text: #edf6ff;
      --muted: #9db6d8;
      --blue: #0a66ff;
      --cyan: #66d9ff;
      --ok: #00ff9a;
      --error: #ff4560;
      --radius: 10px;
      --shadow: 0 22px 70px rgba(1, 8, 22, 0.52);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 8%, rgba(10, 102, 255, 0.34), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(102, 217, 255, 0.22), transparent 26%),
        linear-gradient(145deg, #030b18 0%, #071b35 52%, #020712 100%);
      color: var(--text);
      padding: 26px;
    }

    .wrap {
      max-width: 940px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .topbar a {
      text-decoration: none;
      color: var(--cyan);
      background: rgba(102, 217, 255, 0.08);
      border: 1px solid rgba(102, 217, 255, 0.25);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(10, 102, 255, 0.2), rgba(102, 217, 255, 0.08));
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 680px;
    }

    .content {
      padding: 22px;
      display: grid;
      gap: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border-radius: var(--radius);
      border: 1px solid rgba(124, 184, 255, 0.25);
      background: rgba(3, 18, 43, 0.75);
      color: var(--text);
      outline: none;
      padding: 11px 12px;
      font: inherit;
    }

    input:focus,
    select:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(102, 217, 255, 0.14);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      min-height: 42px;
      border-radius: var(--radius);
      border: 0;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      padding: 10px 16px;
      font: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      min-width: 180px;
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: var(--muted);
    }

    .status {
      display: none;
      padding: 11px 12px;
      border-radius: var(--radius);
      font-weight: 700;
      font-size: 13px;
      border: 1px solid transparent;
    }

    .status.show {
      display: block;
    }

    .status.ok {
      color: var(--ok);
      background: rgba(0, 255, 154, 0.08);
      border-color: rgba(0, 255, 154, 0.35);
    }

    .status.error {
      color: var(--error);
      background: rgba(255, 69, 96, 0.08);
      border-color: rgba(255, 69, 96, 0.35);
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      body {
        padding: 12px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 24px;
      }

      .btn-primary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a href="home.html">🏠 Explorer</a>
      <a href="dashboard.html">🎧 Mis Beats</a>
      <a href="subirbeats.html">⬆️ Subir Beat</a>
      <a href="admin-descargas.html">📥 Descargas</a>
    </div>

    <section class="card">
      <div class="hero">
        <h1>Admi HTML</h1>
        <p>Panel para crear usuarios del sistema. Solo puede usarlo una cuenta con rol administrador.</p>
      </div>

      <form id="userForm" class="content">
        <div class="grid">
          <label>
            Correo del nuevo usuario
            <input type="email" id="email" placeholder="usuario@dominio.com" required />
          </label>

          <label>
            Rol de acceso
            <select id="role">
              <option value="user">Usuario</option>
              <option value="admin">Administrador</option>
            </select>
          </label>
        </div>

        <label>
          Contraseña
          <input type="password" id="password" minlength="6" placeholder="Mínimo 6 caracteres" required />
        </label>

        <div id="status" class="status"></div>

        <div class="actions">
          <button id="submitBtn" type="submit" class="btn-primary">Crear usuario</button>
          <button type="button" class="btn-ghost" id="clearBtn">Limpiar</button>
        </div>

        <p class="meta">Tip: usa correos reales para poder auditar mejor quién toma cada beat.</p>
      </form>
    </section>
  </div>

  <script>
    const API_URL = "https://backend-j3sk.onrender.com";
    const form = document.getElementById("userForm");
    const statusBox = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");
    const clearBtn = document.getElementById("clearBtn");

    function token() {
      return localStorage.getItem("token");
    }

    function showStatus(text, type) {
      statusBox.textContent = text;
      statusBox.className = `status show ${type}`;
    }

    async function validarAdmin() {
      if (!token()) {
        window.location.replace("index.html");
        return false;
      }

      try {
        const res = await fetch(`${API_URL}/me`, {
          headers: { Authorization: "Bearer " + token() }
        });
        if (!res.ok) throw new Error("Sesión inválida");
        const user = await res.json();
        if (user.role !== "admin") {
          alert("Solo administradores");
          window.location.replace("home.html");
          return false;
        }
        return true;
      } catch {
        localStorage.removeItem("token");
        window.location.replace("index.html");
        return false;
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const ok = await validarAdmin();
      if (!ok) return;

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const role = document.getElementById("role").value;

      if (!email || !password) {
        showStatus("Completa todos los campos.", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Creando...";

      try {
        const res = await fetch(`${API_URL}/register`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token()
          },
          body: JSON.stringify({ email, password, role })
        });

        const text = await res.text();
        if (!res.ok) {
          showStatus(text || "No se pudo crear el usuario.", "error");
          return;
        }

        showStatus(`Usuario creado: ${email} (${role}).`, "ok");
        form.reset();
      } catch {
        showStatus("Error de conexión con el backend.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Crear usuario";
      }
    });

    clearBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim().toLowerCase();
      
      if (!email) {
        showStatus("Ingresa un email para eliminar el usuario.", "error");
        return;
      }

      const confirm = window.confirm(`¿Estás seguro de que deseas eliminar al usuario ${email}?`);
      if (!confirm) return;

      clearBtn.disabled = true;
      clearBtn.textContent = "Eliminando...";

      try {
        const res = await fetch(`${API_URL}/admin/users/delete`, {
          method: "DELETE",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + token()
          },
          body: JSON.stringify({ email })
        });

        const text = await res.text();
        if (!res.ok) {
          showStatus(text || "No se pudo eliminar el usuario.", "error");
          return;
        }

        showStatus(`Usuario ${email} eliminado exitosamente.`, "ok");
        form.reset();
      } catch (err) {
        console.error(err);
        showStatus("Error de conexión con el backend.", "error");
      } finally {
        clearBtn.disabled = false;
        clearBtn.textContent = "Limpiar";
      }
    });

    validarAdmin();
  </script>
</body>
</html>
