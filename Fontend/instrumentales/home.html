<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Beats - Home</title>
  <link rel="stylesheet" href="cssz/dashboard.css" />
  <link rel="stylesheet" href="../assets/modal-obtener.css" />
  <link rel="stylesheet" href="../assets/reproductor-beats.css" />
  <link rel="icon" href="/Fontend/img/logo de pestana .png">
</head>
<body>

<div class="layout">
  <aside class="sidebar active" id="sidebar">
    <button id="sidebarHandle" class="sidebar-handle" type="button">☰</button>

    <div class="brand-block">
      <span class="brand-mark">GB</span>
      <div>
        <h2>Go Beats</h2>
        <p>Catálogo general</p>
      </div>
    </div>

    <nav class="side-nav">
      <a href="home.html" class="active">🏠 Explorer</a>
      <a href="dashboard.html">🎧 Mis Beats</a>
      <a href="subirbeats.html">⭐ Destacados / Subir</a>
      <a href="admin-descargas.html" class="admin-only hidden">📥 Quién descargó</a>
      <a href="admi.html" class="admin-only hidden">🛠️ Admi HTML</a>
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <button id="toggleSidebar">☰</button>
      <div>
        <h1>Todos los beats</h1>
      </div>
      <div>
        <span id="userBadge">Cargando...</span>
        <button id="logoutBtn">Cerrar sesión</button>
      </div>
    </header>

    <section>
      <input id="searchInput" placeholder="Buscar..." />
    </section>

    <div id="beats-status">Cargando beats...</div>
    <div id="beats-container"></div>
  </main>
</div>

<script>
const API_URL = "https://backend-j3sk.onrender.com";

let usuarioActual = null;
let beatsGlobal = [];

function token() {
  return localStorage.getItem("token");
}

function authHeaders() {
  return { Authorization: "Bearer " + token() };
}

// 🔐 proteger
async function proteger() {
  if (!token()) {
    window.location = "index.html";
    return;
  }

  const res = await fetch(`${API_URL}/me`, { headers: authHeaders() });
  usuarioActual = await res.json();

  document.getElementById("userBadge").textContent =
    usuarioActual.role === "admin"
      ? "ADMIN: " + usuarioActual.email
      : usuarioActual.email;
}

// 🎨 render
function renderBeats() {
  const container = document.getElementById("beats-container");

  container.innerHTML = beatsGlobal.map(beat => {
    const isTaken = beat.assigned;
    const isAdmin = usuarioActual.role === "admin";

    return `
      <div style="border:1px solid #333;padding:10px;margin:10px;">
        <h3>${beat.name}</h3>
        <p>${beat.producer}</p>

        ${
          isTaken
            ? `<button disabled>No disponible</button>`
            : `<button class="btn-obtener"
                data-beat-id="${beat._id}"
                data-beat-file="${beat.fileUrl}">
                Tomar
              </button>`
        }

        ${
          isAdmin
            ? `<button class="btn-delete" data-id="${beat._id}" style="margin-left:10px;">🗑 Eliminar</button>`
            : ""
        }
      </div>
    `;
  }).join("");
}

// 📥 cargar
async function cargarBeats() {
  const res = await fetch(`${API_URL}/all-beats`, {
    headers: authHeaders()
  });

  beatsGlobal = await res.json();
  renderBeats();
}

// 🔥 tomar beat
document.addEventListener("click", async (e) => {
  const btn = e.target.closest(".btn-obtener");
  if (!btn) return;

  const beatId = btn.dataset.beatId;
  const fileUrl = btn.dataset.beatFile;

  try {
    const res = await fetch(`${API_URL}/beats/take/${beatId}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token()
      },
      body: JSON.stringify({
        name: usuarioActual.email.split("@")[0],
        email: usuarioActual.email
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data || "Error al tomar beat");
      return;
    }

    // descarga
    const link = document.createElement("a");
    link.href = fileUrl;
    link.download = "";
    link.click();

    alert("Beat tomado 🔥");
    cargarBeats();

  } catch (err) {
    console.error(err);
    alert("Error de conexión");
  }
});

// 🗑 eliminar beat
document.addEventListener("click", async (e) => {
  const btn = e.target.closest(".btn-delete");
  if (!btn) return;

  const id = btn.dataset.id;

  if (!confirm("¿Eliminar este beat?")) return;

  try {
    const res = await fetch(`${API_URL}/beats/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization": "Bearer " + token()
      }
    });

    if (!res.ok) {
      alert("Error al eliminar");
      return;
    }

    alert("Beat eliminado 🗑");
    cargarBeats();

  } catch (err) {
    console.error(err);
    alert("Error del servidor");
  }
});

// logout
document.getElementById("logoutBtn").onclick = () => {
  localStorage.removeItem("token");
  window.location = "index.html";
};

// init
(async () => {
  await proteger();
  await cargarBeats();
})();
</script>

</body>
</html>
