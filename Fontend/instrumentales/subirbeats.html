<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subir Beat - Go Beats</title>
  <link rel="stylesheet" href="cssz/subirbeats.css">
  <style>
    .container {
      max-width: 600px;
      margin: 40px auto;
    }

    .topbar {
      margin-bottom: 30px;
      padding: 15px 20px;
      background: rgba(10, 24, 48, 0.78);
      border-radius: 10px;
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    .topbar a {
      color: #4da3ff;
      text-decoration: none;
      font-size: 14px;
      padding: 8px 12px;
      border: 1px solid rgba(77, 163, 255, 0.3);
      border-radius: 6px;
      transition: all 0.3s;
    }

    .topbar a:hover {
      background: rgba(77, 163, 255, 0.15);
      border-color: #4da3ff;
    }

    .hidden {
      display: none !important;
    }

    .form-section {
      background: rgba(10, 24, 48, 0.78);
      border: 1px solid rgba(124, 184, 255, 0.2);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 22px 70px rgba(1, 8, 22, 0.52);
    }

    h1 {
      margin-bottom: 25px;
      color: #edf6ff;
      font-size: 28px;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    .form-group label {
      color: #9db6d8;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select, textarea {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(124, 184, 255, 0.22);
      background: rgba(3, 18, 43, 0.74);
      color: #edf6ff;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #66d9ff;
      box-shadow: 0 0 0 3px rgba(102, 217, 255, 0.12);
      background: rgba(3, 18, 43, 0.9);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .file-input-wrapper {
      position: relative;
    }

    .file-input-wrapper input[type="file"] {
      display: none;
    }

    .file-input-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      border: 2px dashed rgba(102, 217, 255, 0.3);
      border-radius: 8px;
      background: rgba(102, 217, 255, 0.05);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      color: #66d9ff;
      font-weight: 600;
    }

    .file-input-label:hover {
      border-color: #66d9ff;
      background: rgba(102, 217, 255, 0.1);
    }

    .file-input-label.active {
      border-color: #0a66ff;
      background: rgba(10, 102, 255, 0.15);
      color: #0a66ff;
    }

    .file-name {
      display: block;
      margin-top: 8px;
      font-size: 12px;
      color: #9db6d8;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 25px;
    }

    button {
      min-height: 44px;
      padding: 10px 20px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, #0a66ff, #2f8cff);
      color: white;
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
      flex: 1;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(10, 102, 255, 0.34);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: rgba(102, 217, 255, 0.15);
      color: #66d9ff;
      border: 1px solid rgba(102, 217, 255, 0.3);
    }

    button.secondary:hover {
      background: rgba(102, 217, 255, 0.25);
      border-color: #66d9ff;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    #msg {
      min-height: 30px;
      margin-top: 15px;
      padding: 12px 15px;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      display: none;
    }

    #msg.success {
      display: block;
      background: rgba(0, 255, 150, 0.1);
      border: 1px solid rgba(0, 255, 150, 0.3);
      color: #00ff9a;
    }

    #msg.error {
      display: block;
      background: rgba(255, 69, 96, 0.1);
      border: 1px solid rgba(255, 69, 96, 0.3);
      color: #ff4560;
    }

    .info-box {
      background: rgba(10, 102, 255, 0.08);
      border: 1px solid rgba(10, 102, 255, 0.2);
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #9db6d8;
      line-height: 1.6;
    }

    .info-box strong {
      color: #66d9ff;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="home.html">🏠 Explorer</a>
  <a href="dashboard.html">🎧 Mis Beats</a>
  <a href="subirbeats.html">⭐ Destacados / Subir</a>
  <a href="admin-descargas.html" class="admin-only hidden">📥 Quién descargó</a>
  <a href="admi.html" class="admin-only hidden">🛠️ Admi HTML</a>
  <span id="userBadge" class="user-badge">Cargando...</span>
</div>

<div class="container">
  <div class="form-section">
    <h1>⬆️ Subir un Beat</h1>

    <div class="info-box">
      <strong>📝 Requisitos:</strong><br>
      • Audio en formato MP3, WAV o OGG (máx. 50MB)<br>
      • Portada en PNG o JPG (exactamente 3000x3000px)<br>
      • Todos los campos son obligatorios
    </div>

    <form id="uploadForm" enctype="multipart/form-data">
      <!-- Información Básica -->
      <fieldset style="border: none; padding: 0; margin: 0;">
        <legend style="font-size: 14px; color: #66d9ff; font-weight: 700; margin-bottom: 15px;">ℹ️ Información del Beat</legend>
        
        <div class="form-group">
          <label for="name">Nombre del Beat</label>
          <input type="text" id="name" name="name" placeholder="ej: Summer Vibes" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="bpm">BPM</label>
            <input type="number" id="bpm" name="bpm" placeholder="ej: 90" min="40" max="200" required>
          </div>
          <div class="form-group">
            <label for="key">Tonalidad</label>
            <input type="text" id="key" name="key" placeholder="ej: C mayor" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="genre">Género</label>
            <select id="genre" name="genre" required>
              <option value="">Selecciona un género</option>
              <option>Trap</option>
              <option>Drill</option>
              <option>R&B</option>
              <option>Hip-Hop</option>
              <option>Reggaeton</option>
              <option>Techno</option>
              <option>House</option>
              <option>Lo-Fi</option>
              <option>Otros</option>
            </select>
          </div>
          <div class="form-group">
            <label for="mood">Sentimiento</label>
            <select id="mood" name="mood" required>
              <option value="">Selecciona un sentimiento</option>
              <option>Dark</option>
              <option>Sad</option>
              <option>Melódico</option>
              <option>Energético</option>
              <option>Romántico</option>
              <option>Agresivo</option>
              <option>Relajante</option>
              <option>Motivacional</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="producer">Tu Nombre / Productor</label>
          <input type="text" id="producer" name="producer" placeholder="ej: Soldi On The Beat" required>
        </div>
      </fieldset>

      <!-- Archivos -->
      <fieldset style="border: none; padding: 0; margin: 0;">
        <legend style="font-size: 14px; color: #66d9ff; font-weight: 700; margin: 20px 0 15px 0;">📦 Archivos</legend>

        <div class="form-group">
          <label for="audio">Archivo de Audio</label>
          <div class="file-input-wrapper">
            <input type="file" id="audio" name="audio" accept="audio/*" required>
            <label for="audio" class="file-input-label" id="audioLabel">
              🎵 Selecciona tu beat (MP3, WAV, OGG)
              <span class="file-name" id="audioName"></span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="cover">Portada (3000x3000px exactos)</label>
          <div class="file-input-wrapper">
            <input type="file" id="cover" name="cover" accept="image/*" required>
            <label for="cover" class="file-input-label" id="coverLabel">
              🖼️ Selecciona la portada (PNG, JPG)
              <span class="file-name" id="coverName"></span>
            </label>
          </div>
        </div>
      </fieldset>

      <!-- Botones -->
      <div class="btn-group">
        <button type="button" class="secondary" onclick="volver()">← Cancelar</button>
        <button type="submit">⬆️ Subir Beat</button>
      </div>
    </form>

    <div id="msg"></div>
  </div>
</div>

<script>
const API_URL = "https://backend-j3sk.onrender.com";
const form = document.getElementById("uploadForm");
const msg = document.getElementById("msg");
const userBadge = document.getElementById("userBadge");
let coverDimensionesValidas = false;

// File input handlers
document.getElementById("audio").addEventListener("change", (e) => {
  const name = e.target.files[0]?.name || "";
  document.getElementById("audioName").textContent = name ? `✓ ${name}` : "";
  document.getElementById("audioLabel").classList.toggle("active", !!name);
});

document.getElementById("cover").addEventListener("change", (e) => {
  const file = e.target.files[0];
  const name = file?.name || "";
  const coverName = document.getElementById("coverName");
  document.getElementById("coverLabel").classList.toggle("active", !!name);

  if (!file) {
    coverName.textContent = "";
    coverDimensionesValidas = false;
    return;
  }

  const img = new Image();
  img.onload = () => {
    const w = img.width;
    const h = img.height;
    const exacta3000 = w === 3000 && h === 3000;

    if (exacta3000) {
      coverDimensionesValidas = true;
      coverName.textContent = `✓ ${name} (${w}x${h})`;
      return;
    }

    coverDimensionesValidas = false;
    coverName.textContent = `⚠ ${name} (${w}x${h}) - debe ser exactamente 3000x3000`;
    document.getElementById("cover").value = "";
    alert("La portada debe ser exactamente 3000x3000 pixeles, estilo BeatStars.");
  };

  img.onerror = () => {
    coverDimensionesValidas = false;
    coverName.textContent = `⚠ ${name} - archivo invalido`;
    document.getElementById("cover").value = "";
  };

  img.src = URL.createObjectURL(file);
});

function token() {
  return localStorage.getItem("token");
}

function authHeaders(extra = {}) {
  return { ...extra, Authorization: "Bearer " + token() };
}

async function proteger() {
  if (!token()) {
    window.location.replace("index.html");
    return false;
  }

  try {
    const res = await fetch(`${API_URL}/me`, { headers: authHeaders() });
    if (!res.ok) throw new Error("Sesión inválida");

    const user = await res.json();
    userBadge.textContent = user.role === "admin" ? `👤 Admin: ${user.email}` : `👤 ${user.email}`;
    document.body.dataset.role = user.role;
    if (user.role === "admin") {
      document.querySelectorAll(".admin-only").forEach((el) => el.classList.remove("hidden"));
    }
    return true;
  } catch {
    localStorage.removeItem("token");
    window.location.replace("index.html");
    return false;
  }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (!coverDimensionesValidas) {
    msg.classList.remove("success");
    msg.classList.add("error");
    msg.textContent = "❌ La portada debe ser exactamente 3000x3000 px.";
    return;
  }

  const submitBtn = form.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  submitBtn.textContent = "⏳ Subiendo...";

  const formData = new FormData(form);

  try {
    const res = await fetch(`${API_URL}/upload-beat`, {
      method: "POST",
      headers: authHeaders(),
      body: formData
    });

    const text = await res.text();

    if (!res.ok) {
      msg.classList.remove("success");
      msg.classList.add("error");
      msg.textContent = "❌ " + text;
      submitBtn.disabled = false;
      submitBtn.textContent = "⬆️ Subir Beat";
      return;
    }

    msg.classList.remove("error");
    msg.classList.add("success");
    msg.textContent = "✅ Beat subido correctamente. Abriendo tu panel en 2 segundos...";

    form.reset();
    document.getElementById("audioLabel").classList.remove("active");
    document.getElementById("coverLabel").classList.remove("active");
    document.getElementById("audioName").textContent = "";
    document.getElementById("coverName").textContent = "";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 2000);
  } catch (err) {
    msg.classList.remove("success");
    msg.classList.add("error");
    msg.textContent = "❌ Error de conexión con el servidor";
    submitBtn.disabled = false;
    submitBtn.textContent = "⬆️ Subir Beat";
  }
});

function volver() {
  if (confirm("¿Descartar cambios?")) {
    window.location.href = "dashboard.html";
  }
}

proteger();
</script>

</body>
</html>
